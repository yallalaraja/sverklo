name: Publish VS Code extension

# Publishes extensions/vscode/ to the VS Code Marketplace + Open VSX
# Registry on every release tag matching v*. The .vsix is also uploaded
# as a release artefact so users without Marketplace access can install
# via `code --install-extension <url>`.
#
# Setup once on the user's side:
#
#   1. Create a Microsoft publisher account (free, ~10 min):
#        https://marketplace.visualstudio.com/manage/createpublisher
#      Set the publisher id in extensions/vscode/package.json (already
#      "sverklo"). Generate a VSCE PAT and store it as the
#      VSCE_PAT secret on the GitHub repo.
#
#   2. Optional: create an Open VSX publisher and store an OVSX_PAT
#      secret. Open VSX is the registry that VSCodium / Cursor / others
#      pull from. Free; same form-based signup.
#
# Until both secrets exist, this workflow is dormant — the steps below
# skip when the corresponding token is missing.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (e.g. 0.1.1). Leave empty to use package.json.'
        required: false

jobs:
  vsix:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for uploading release artefacts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: extensions/vscode/package-lock.json

      - name: Install + compile + package
        working-directory: extensions/vscode
        run: |
          npm ci
          npm run compile
          npx vsce package --out sverklo-vscode.vsix

      - name: Upload .vsix to the GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: extensions/vscode/sverklo-vscode.vsix
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to VS Code Marketplace
        if: env.VSCE_PAT != ''
        working-directory: extensions/vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish --packagePath sverklo-vscode.vsix --pat "$VSCE_PAT"

      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        working-directory: extensions/vscode
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx ovsx publish sverklo-vscode.vsix --pat "$OVSX_PAT"
