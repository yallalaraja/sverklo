name: Latency regression

# Run the MCP roundtrip latency profiler on every PR. The numbers are
# uploaded as an artifact and a sibling workflow (latency-comment.yml)
# posts them back as a PR comment from the trusted base-branch context.
# Split is intentional: this workflow runs in the untrusted PR context
# and gets a read-only token on fork PRs (GitHub security guard), so it
# can't comment on its own. Inspired by Bun's benchmark-in-CI pattern —
# a silent regression is worse than a loud one.

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "bin/**"
      - "scripts/mcp-latency-profile.mjs"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/latency-regression.yml"
  workflow_dispatch:

# Only one run per PR — if a new push arrives, cancel the old one.
concurrency:
  group: latency-${{ github.ref }}
  cancel-in-progress: true

jobs:
  latency:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Read-only token. Fork PRs can't escalate this anyway — GitHub
    # caps fork-PR tokens to read regardless of what we declare. The
    # comment is posted by latency-comment.yml on workflow_run, where
    # the token runs in the trusted base-branch context.
    permissions:
      contents: read

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      # Index sverklo's own repo first so the bench has something to
      # query. Then run the profiler. We keep runs small (10) so CI
      # stays fast; p95 is noisy at n=10 but the trend is enough to
      # flag a 2× regression, which is what we care about catching.
      - name: Profile MCP roundtrip latency
        id: profile
        run: |
          node scripts/mcp-latency-profile.mjs --runs=10 --json > latency-pr.json
          cat latency-pr.json

      # Also run against the base branch for comparison. We check out
      # the base ref in a sibling directory so the PR tree stays intact.
      - name: Checkout base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: base-checkout

      - name: Build base
        working-directory: base-checkout
        run: |
          npm ci
          npm run build || true

      - name: Profile base
        working-directory: base-checkout
        run: |
          # If the profiler doesn't exist on base (older PR), emit an
          # empty object so the compare step doesn't crash.
          if [ -f scripts/mcp-latency-profile.mjs ]; then
            node scripts/mcp-latency-profile.mjs --runs=10 --json > ../latency-base.json || echo '{}' > ../latency-base.json
          else
            echo '{}' > ../latency-base.json
          fi

      # Stamp the PR number so the trusted comment workflow
      # (latency-comment.yml) can find which PR triggered this run
      # without trusting any PR-controlled metadata.
      - name: Record PR number
        run: echo "${{ github.event.pull_request.number }}" > pr-number.txt

      - name: Upload profile artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: latency-profiles
          path: |
            latency-pr.json
            latency-base.json
            pr-number.txt
          retention-days: 14
