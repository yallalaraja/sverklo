name: Latency comment

# Trusted half of the latency-regression pipeline. Runs in the base-branch
# context (workflow_run) so it can post comments on fork PRs that the
# untrusted half (latency-regression.yml on `pull_request`) cannot.
#
# This workflow MUST NOT execute any code from the PR. It only reads the
# JSON artifacts produced by latency-regression.yml. The PR number comes
# from a stamped artifact, not from PR-controlled inputs.

on:
  workflow_run:
    workflows: ["Latency regression"]
    types: [completed]

jobs:
  comment:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success'
    permissions:
      pull-requests: write
      actions: read

    steps:
      - name: Download artifact from triggering run
        uses: actions/download-artifact@v4
        with:
          name: latency-profiles
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read PR number
        id: pr
        run: |
          if [ ! -f pr-number.txt ]; then
            echo "No pr-number.txt — skipping comment."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          number=$(cat pr-number.txt | tr -d '[:space:]')
          if ! [[ "$number" =~ ^[0-9]+$ ]]; then
            echo "pr-number.txt did not contain a number — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "number=$number" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Compare and comment
        if: steps.pr.outputs.skip != 'true'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          script: |
            const fs = require('fs');
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const pr = JSON.parse(fs.readFileSync('latency-pr.json', 'utf8'));
            const base = JSON.parse(fs.readFileSync('latency-base.json', 'utf8'));

            const prTools = pr.tools || {};
            const baseTools = base.tools || {};

            const rows = [];
            for (const key of Object.keys(prTools)) {
              const p = prTools[key] || {};
              const b = baseTools[key] || {};
              const bp50 = b.p50_ms ?? null;
              const pp50 = p.p50_ms ?? null;
              let delta = '—';
              let flag = '';
              if (bp50 != null && pp50 != null && bp50 > 0) {
                const pct = ((pp50 - bp50) / bp50) * 100;
                const sign = pct >= 0 ? '+' : '';
                delta = `${sign}${pct.toFixed(1)}%`;
                if (pct > 50) flag = ' 🔴';
                else if (pct > 20) flag = ' 🟡';
                else if (pct < -20) flag = ' 🟢';
              }
              rows.push(`| \`${key}\` | ${bp50 ?? '—'} | ${pp50 ?? '—'} | ${delta}${flag} | ${p.p95_ms ?? '—'} |`);
            }

            const body = [
              '## MCP roundtrip latency',
              '',
              'End-to-end stdio JSON-RPC roundtrip per tool call (milliseconds). Base = target branch, PR = this branch. 10 runs per tool, first dropped as warm-up.',
              '',
              '| tool | base p50 | PR p50 | Δ | PR p95 |',
              '|------|---------:|-------:|--:|-------:|',
              ...rows,
              '',
              `Init handshake: base ${base.initialize_ms ?? '—'} ms → PR ${pr.initialize_ms ?? '—'} ms`,
              '',
              '🔴 = regression > 50 %, 🟡 = regression > 20 %, 🟢 = improvement > 20 %.',
              '',
              '_Generated by `.github/workflows/latency-regression.yml`._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const marker = '## MCP roundtrip latency';
            const existing = comments.find(c => c.user.type === 'Bot' && c.body && c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
