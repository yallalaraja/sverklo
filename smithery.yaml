# Smithery MCP directory metadata.
# Registered at https://smithery.ai/server/sverklo
#
# Updating this file:
#  - Keep the startCommand matching the npm binary — changes here become the
#    "install" output users see, so the command must actually work.
#  - Bump version in sync with package.json on every release.

name: sverklo
version: 0.19.0
description: >-
  Local-first code intelligence MCP for AI coding agents. 37 tools across
  hybrid BM25 + ONNX vector search, symbol-level blast-radius analysis,
  diff-aware PR review with risk scoring, and bi-temporal memory pinned to
  git SHAs. Runs entirely on your machine — embedded SQLite + a local ONNX
  model. No cloud. No API keys. No data leaves your laptop. Stops Claude
  Code, Cursor, and other AI agents from hallucinating function names that
  don't exist in your codebase. Published 60-task retrieval benchmark at
  https://sverklo.com/bench/ — including the slice where sverklo loses to
  grep.

homepage: https://sverklo.com
repository: https://github.com/sverklo/sverklo
license: MIT
author: sverklo

# Categories used by Smithery's search and filtering.
categories:
  - code-search
  - code-intelligence
  - developer-tools
  - memory
  - local-first

# Keywords used by Smithery's full-text search.
keywords:
  - code-search
  - semantic-search
  - pagerank
  - bm25
  - onnx
  - embeddings
  - local-first
  - claude-code
  - cursor
  - windsurf
  - antigravity
  - diff-review
  - impact-analysis
  - refactor
  - memory
  - git-aware

# How a user should install sverklo as an MCP server. This is what
# Smithery renders on the install page — keep it copy-paste-able.
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - projectPath
    properties:
      projectPath:
        type: string
        title: Project path
        description: Absolute path to the project root sverklo should index.
  commandFunction: |-
    (config) => ({
      command: 'npx',
      args: ['-y', 'sverklo', config.projectPath]
    })

# Optional runtime configuration surface. These are NOT required —
# sverklo has zero-config defaults — but power users may want to set them.
env:
  SVERKLO_DEBUG:
    description: Enable debug logging to stderr. Set to "1" to enable.
    required: false
  SVERKLO_DISABLE_HINTS:
    description: Disable intent-aware hint suffixes on tool results.
    required: false
  SVERKLO_ZILLIZ_COMPAT:
    description: Expose Zilliz claude-context compatibility tool aliases.
    required: false

# Badges and links shown on the Smithery page.
links:
