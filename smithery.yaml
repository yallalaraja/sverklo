    url: https://sverklo.com
  - label: 60-task retrieval benchmark
    url: https://sverklo.com/bench/
  - label: Performance benchmarks
    url: https://github.com/sverklo/sverklo/blob/main/BENCHMARKS.md
  - label: Comparisons (vs Cody, Greptile, Cursor, etc.)
    url: https://sverklo.com/vs/
  - label: Playground
    url: https://sverklo.com/playground/
  - label: Telemetry policy
    url: https://github.com/sverklo/sverklo/blob/main/TELEMETRY.md
  - label: Security policy
    url: https://github.com/sverklo/sverklo/blob/main/SECURITY.md
  - label: Citation (Zenodo DOI)
    url: https://doi.org/10.5281/zenodo.19802051
